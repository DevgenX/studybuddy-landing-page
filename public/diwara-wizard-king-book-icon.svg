<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Diwara wizard-king book app icon</title>
  <desc id="desc">A rounded-square fantasy app icon showing an enchanted spellbook with a gold crown and wand bookmark.</desc>

  <defs>
    <linearGradient id="bg" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#163B7A"/>
      <stop offset="0.48" stop-color="#123F64"/>
      <stop offset="1" stop-color="#0D6B73"/>
    </linearGradient>

    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(516 420) rotate(90) scale(380)">
      <stop offset="0" stop-color="#FFF3A6" stop-opacity="0.46"/>
      <stop offset="0.52" stop-color="#B77DFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0D6B73" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bookCover" x1="232" y1="356" x2="792" y2="802" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6F42C1"/>
      <stop offset="0.5" stop-color="#3B4FB2"/>
      <stop offset="1" stop-color="#1F8A8A"/>
